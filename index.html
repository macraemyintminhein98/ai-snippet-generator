<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APEX Snippet Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 flex flex-col min-h-screen items-center justify-center p-4">
    <div class="bg-gray-800 p-8 rounded-lg shadow-xl w-full max-w-md">
        <h1 class="text-4xl font-bold mb-4 text-center text-blue-400">APEX Snippet Pro</h1>
        <p class="text-center text-gray-400 mb-8">Generate perfect code snippets instantly.</p>
        
        <div class="mb-6">
            <label for="prompt" class="block text-gray-300 text-sm font-bold mb-2">What do you need?</label>
            <input type="text" id="prompt" class="shadow appearance-none border rounded w-full py-3 px-4 text-gray-800 leading-tight focus:outline-none focus:shadow-outline bg-gray-200 border-gray-600 placeholder-gray-500" placeholder="e.g., Python date parsing, React button component">
        </div>
        
        <button id="generateBtn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded focus:outline-none focus:shadow-outline w-full mb-6 transition-all duration-200 ease-in-out">
            Generate Snippet
        </button>
        
        <div id="output" class="bg-gray-700 p-4 rounded-lg overflow-x-auto relative min-h-[100px] flex items-center justify-center">
            <pre id="codeBlock" class="text-sm text-gray-200 font-mono whitespace-pre-wrap">Your generated code will appear here...</pre>
            <button id="copyBtn" class="absolute top-2 right-2 bg-gray-600 hover:bg-gray-500 text-white text-xs px-2 py-1 rounded hidden">Copy</button>
        </div>

        <p class="mt-8 text-center text-gray-500 text-sm">Ready to streamline your workflow? <a href="#" class="text-blue-400 hover:underline">Get access for just $9.99!</a></p>
    </div>

    <script>
        const promptInput = document.getElementById('prompt');
        const generateBtn = document.getElementById('generateBtn');
        const codeBlock = document.getElementById('codeBlock');
        const copyBtn = document.getElementById('copyBtn');
        const outputDiv = document.getElementById('output');

        generateBtn.addEventListener('click', async () => {
            codeBlock.textContent = 'Generating...';
            copyBtn.classList.add('hidden');
            // In a real app, this would call an API endpoint.
            // For this example, we'll simulate a response.
            setTimeout(() => {
                const simulatedCode = "function greet() {\n  console.log('Hello, APEX!');\n}\ngreet();";
                codeBlock.textContent = simulatedCode;
                copyBtn.classList.remove('hidden');
            }, 1500);
        });

        copyBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(codeBlock.textContent).then(() => {
                const originalText = copyBtn.textContent;
                copyBtn.textContent = 'Copied!';
                setTimeout(() => copyBtn.textContent = originalText, 1000);
            }).catch(err => {
                console.error('Failed to copy: ', err);
            });
        });
    </script>
</body>
</html>
